spring:
  application:
    name: management-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:feature_management}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

fms:
  kafka:
    topic: ${FMS_KAFKA_TOPIC:fms.snapshot.changed}
    producer-enabled: ${FMS_KAFKA_PRODUCER_ENABLED:true}

server:
  port: ${SERVER_PORT:8080}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
  type-handlers-package: com.fms.management.handler

logging:
  level:
    com.fms.management: INFO
    com.baomidou.mybatisplus: WARN
